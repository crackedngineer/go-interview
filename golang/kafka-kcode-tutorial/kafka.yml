# Docker Compose file for the full Kafka sorting pipeline.
#
# Services:
#   kafka   – single-node KRaft broker (no ZooKeeper → saves ~300 MB RAM)
#   app     – Go application image containing producer, sorter, and verifier
#
# Resource limits keep the whole stack within 2 GB / 4 vCPU:
#   kafka  – 900 MB RAM, 2 CPU
#   app    – 900 MB RAM, 2 CPU
#   OS+Docker overhead – ~200 MB
#
# Usage:
#   docker compose up --build          # build and run run.sh automatically
#   docker compose run app bash        # get a shell inside the app container

version: "3.9"

services:

  kafka:
    image: apache/kafka:latest
    container_name: kafka
    hostname: kafka
    environment:
      # KRaft (no ZooKeeper) single-node setup.
      KAFKA_NODE_ID: 1
      KAFKA_BROKER_ID: 1
      KAFKA_PROCESS_ROLES: "controller,broker"
      KAFKA_LISTENERS: "PLAINTEXT://:9092,CONTROLLER://:9093"
      KAFKA_ADVERTISED_LISTENERS: "PLAINTEXT://kafka:9092"
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: "CONTROLLER:PLAINTEXT,PLAINTEXT:PLAINTEXT"
      KAFKA_CONTROLLER_QUORUM_VOTERS: "1@kafka:9093"
      KAFKA_CONTROLLER_LISTENER_NAMES: "CONTROLLER"
      KAFKA_AUTO_CREATE_TOPICS_ENABLE: "false"
      KAFKA_INTER_BROKER_LISTENER_NAME: PLAINTEXT

      # ---- JVM / memory tuning ----
      # 640 MB heap leaves headroom for off-heap page cache and OS buffers.
      KAFKA_HEAP_OPTS: "-Xmx640m -Xms256m"

      # ---- Throughput tuning ----
      # Larger log segments reduce index overhead for high-volume topics.
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_GROUP_INITIAL_REBALANCE_DELAY_MS: 0
      KAFKA_TRANSACTION_STATE_LOG_MIN_ISR: 1
      KAFKA_TRANSACTION_STATE_LOG_REPLICATION_FACTOR: 1

      KAFKA_LOG_DIRS: /tmp/kraft-combined-logs
      CLUSTER_ID: MkU3OEVBNTcwNTJENDM2Qk


      # KAFKA_LOG_SEGMENT_BYTES: "268435456"       # 256 MB segments
      # KAFKA_LOG_RETENTION_BYTES: "-1"            # retain all data
      # KAFKA_LOG_RETENTION_HOURS: "2"             # auto-clean after 2 h
      # KAFKA_MESSAGE_MAX_BYTES: "16777216"        # 16 MB max message
      # KAFKA_REPLICA_FETCH_MAX_BYTES: "16777216"
      # KAFKA_SOCKET_SEND_BUFFER_BYTES: "1048576"  # 1 MB socket buffers
      # KAFKA_SOCKET_RECEIVE_BUFFER_BYTES: "1048576"
      # KAFKA_NUM_IO_THREADS: "4"
      # KAFKA_NUM_NETWORK_THREADS: "4"
      # KAFKA_NUM_PARTITIONS: "4"
      # # Disable fsync for speed (acceptable for ephemeral pipeline data).
      # KAFKA_LOG_FLUSH_INTERVAL_MESSAGES: "100000"
      # KAFKA_LOG_FLUSH_INTERVAL_MS: "1000"
    volumes:
      - kafka_data:/bitnami/kafka
    deploy:
      resources:
        limits:
          memory: 900m
          cpus: "2.0"
    healthcheck:
      test: ["CMD-SHELL", "kafka-topics.sh --bootstrap-server localhost:9092 --list 2>/dev/null || exit 1"]
      interval: 10s
      timeout: 10s
      retries: 10
      start_period: 20s

volumes:
  kafka_data:
